
<svg viewBox="0 0 400 200"
	xmlns="http://www.w3.org/2000/svg" height="200">


	<foreignObject x="0" y="0" width="100%" height="100%">
  <div xmlns="http://www.w3.org/1999/xhtml">
  	<style>
      * {
        -ms-overflow-style: none;
        scrollbar-width: none;
        margin: 0;
      }

      .animation {
        display: inline-flex;
        float: left;
        /* position: fixed; */
        /* width: 100vw;
        height: 25vh; */

        /* display: flex; */
        animation: animation 20s;
        clip-path: inset(0);
        font-size: calc(4em/256);
        background-color: white;
        .ci {
          position: relative;
          display: block;
          margin: auto;
          width: 576em;
          height: 256em;
          animation: ci 10s;
          .inside, .outside, .pass1, .pass2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 256em;
            height: 256em;
            .logo {
              position: absolute;
              width: 256em;
              height: 256em;
              transform-origin: 10.4326em 215.4719em;
              transform: rotate(26.5650deg);
              animation: logo 10s;
              .tilt {
                width: 256em;
                height: 256em;
                animation: tilt 10s;
                * {
                  position: absolute;
                  width: 64em;
                  border: 8em solid green;
                  box-sizing: border-box;
                }
                .left {
                  top: 143.5016em;
                  left: 24em;
                }
                .center {
                  top: 77.3655em;
                  left: 96em;
                }
                .right {
                  top: 121.4359em;
                  left: 168em;
                }
              }
            }
          }
          .inside, .outside {
            clip-path: inset(0);
            .left, .center, .right {
              height: 100vmax;
            }
            .left {animation: logo_left 5s;}
            .center {animation: logo_center 5s;}
            .right {animation: logo_right 5s;}
          }
          .inside {
            background-color: #006400;
            .left, .center, .right {
              border: 8em solid white !important;
            }
          }
        }
      }
    </style>
    <div class="animation">
      aaa
      <div class="ci">
        <!-- <div class="outside">
          <div class="logo">
            <div class="tilt">
              <div class="left"></div>
              <div class="center"></div>
              <div class="right"></div>
            </div>
          </div>
        </div> -->
        <div class="inside" id="inside">
          <div class="logo">
            <div class="tilt">
              <div class="left"></div>
              <div class="center"></div>
              <div class="right"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  </foreignObject>
</svg>